spring.application.name=${SPRING_APPLICATION_NAME:spring-security-labo}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_security_labo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.data.web.pageable.one-indexed-parameters=${SPRING_DATA_WEB_PAGEABLE_ONE_INDEXED_PARAMETERS:false}

server.port=${SERVER_PORT:4000}

spring.cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

