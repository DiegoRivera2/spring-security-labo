name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (Mockito)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: chmod +x mvnw && ./mvnw test

  smoke-test:
    name: Smoke test (Docker Compose)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        env:
          CI_POSTGRES_PASSWORD: ci_test_${{ github.run_id }}
        run: |
          cat > .env <<EOF
          SPRING_APPLICATION_NAME=spring-security-labo
          POSTGRES_DB=spring_security_labo
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${CI_POSTGRES_PASSWORD}
          SPRING_JPA_HIBERNATE_DDL_AUTO=update
          SPRING_JPA_SHOW_SQL=false
          SPRING_DATA_WEB_PAGEABLE_ONE_INDEXED_PARAMETERS=false
          SERVER_PORT=4000
          CORS_ALLOWED_ORIGINS=http://localhost:5173
          SECURITY_JWT_SECRET_KEY=c3ByaW5nLXNlY3VyaXR5LWxhYm8tand0LXNlY3JldC1rZXktMzJiIQ==
          SECURITY_JWT_EXPIRATION_TIME=3600000
          EOF

      - name: Build and start containers
        run: docker compose up -d --build --wait

      - name: Smoke test - public endpoint
        run: |
          curl -f http://localhost:4000/api/public/info
          curl -f -X POST http://localhost:4000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"mi-carnet"}'

      - name: Tear down
        if: always()
        run: docker compose down -v
